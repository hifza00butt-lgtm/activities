<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Adding CSS Activities</title>

<!-- Internal CSS -->
<style>
.red{
  color:red;
}
</style>

<!-- External CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Three Methods of Adding CSS</h1>

<!-- Activity 1 -->
<h2>Activity 1: Inline CSS</h2>
<h3 style="color: blue;">Style Me in Blue!</h3>

<!-- Activity 2 -->
<h2>Activity 2: Internal CSS</h2>
<h3 class="red">Style Me in Red!</h3>

<!-- Activity 3 -->
<h2>Activity 3: External CSS</h2>
<h3 class="green">Style Me in Green!</h3>

<!-- Flexbox Activity -->
<h2>Activity 4: CSS Flexbox</h2>

<div class="container">
<div class="box box1">1</div>
<div class="box box2">2</div>
<div class="box box3">3</div>
<div class="box box4">4</div>
</div>

</body>
</html>
